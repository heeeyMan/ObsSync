name: Release

# Build the plugin and publish a GitHub Release whenever a version tag is
# pushed (e.g. `git tag 0.2.3 && git push origin 0.2.3`). The release assets
# (main.js, manifest.json, styles.css) get build-provenance attestations, which
# satisfies Obsidian's review recommendation for artifact attestations.
on:
  push:
    tags:
      - "*.*.*"

permissions:
  # contents: write   -> create the release and upload assets
  # id-token: write   -> mint the OIDC token attest-build-provenance signs with
  # attestations: write -> record the provenance attestation
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc + esbuild)
        run: npm run build

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            styles.css

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            main.js
            manifest.json
            styles.css
