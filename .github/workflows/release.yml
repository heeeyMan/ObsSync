name: Release

# Build the plugin and publish a GitHub Release whenever a version tag is
# pushed (e.g. `git tag 0.2.3 && git push origin 0.2.3`). The release assets
# (main.js, manifest.json, styles.css) get build-provenance attestations, which
# satisfies Obsidian's review recommendation for artifact attestations.
on:
  push:
    tags:
      - "*.*.*"
  # Manual runs are a build/compatibility smoke test (e.g. to confirm the
  # actions run on Node 24). The attest + release steps below are guarded to
  # tag pushes, so a manual run never publishes a Release.
  workflow_dispatch:

# Run the bundled JS actions on Node.js 24. GitHub forces this from 2026-06-16
# and removes Node 20 on 2026-09-16; opting in early surfaces any incompatibility
# now instead of breaking a future release.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  # contents: write   -> create the release and upload assets
  # id-token: write   -> mint the OIDC token attest-build-provenance signs with
  # attestations: write -> record the provenance attestation
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc + esbuild)
        run: npm run build

      - name: Attest build provenance
        if: github.ref_type == 'tag'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            styles.css

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            main.js
            manifest.json
            styles.css
